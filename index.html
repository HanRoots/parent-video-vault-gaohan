<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>家长会视频</title>
  <link rel="stylesheet" href="assets/site.css?v=20260709-anchors2">
</head>
<body>
  <main class="page-shell">
    <section class="video-pane">
      <header class="page-head">
        <div>
          <p>家长会视频</p>
          <h1 id="videoTitle">视频列表</h1>
        </div>
        <a id="openVideoLink" class="open-link" href="#" target="_blank" rel="noopener" hidden>下载视频</a>
      </header>

      <video id="videoPlayer" controls playsinline preload="metadata"></video>
      <p id="videoMeta" class="video-meta"></p>
      <p id="videoDescription" class="video-description"></p>

      <section id="videoSummary" class="summary-section" hidden>
        <h2>家长速读</h2>
        <div id="summaryList" class="summary-list"></div>
      </section>

      <section id="videoAnchors" class="summary-section" hidden>
        <h2>时间锚点</h2>
        <div id="anchorList" class="anchor-list"></div>
      </section>
    </section>

    <aside class="playlist-pane">
      <div class="playlist-head">
        <strong>全部视频</strong>
        <span id="videoCount">0</span>
      </div>
      <div id="videoList" class="video-list"></div>
    </aside>
  </main>

  <template id="videoCardTemplate">
    <button class="video-card" type="button">
      <span data-field="title"></span>
      <small data-field="meta"></small>
    </button>
  </template>

  <script src="videos.js?v=20260709-anchors2"></script>
  <script src="assets/site.js?v=20260709-anchors2"></script>
</body>
</html>
